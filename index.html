<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garg Enterprise | Market AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #card-glow { transition: all 0.7s ease-in-out; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-xl px-6 py-12">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter">GARG <span class="text-blue-500">AI</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em] font-bold">Scenario Intelligence v2.0</p>
            </div>
            <div class="text-right">
                <span id="clock" class="text-sm mono text-slate-500">00:00:00</span>
                <div class="flex items-center gap-2 justify-end mt-1">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    <span class="text-[10px] mono text-blue-400 uppercase">System Active</span>
                </div>
            </div>
        </div>

        <div class="relative group">
            <div id="card-glow" class="absolute -inset-1 bg-blue-500 rounded-[2.5rem] blur-xl opacity-20 group-hover:opacity-40"></div>
            
            <div class="relative bg-[#161b2c] border border-slate-800/50 rounded-[2rem] p-10 shadow-2xl overflow-hidden">
                <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-blue-600/5 rounded-full blur-3xl"></div>

                <div class="flex justify-between items-center mb-12">
                    <div class="bg-slate-900/80 border border-slate-700 px-4 py-1.5 rounded-full">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Market Verdict</span>
                    </div>
                    <span id="conf-val" class="text-xs mono bg-blue-500/10 border border-blue-500/20 px-4 py-1.5 rounded-full text-blue-400 font-bold">
                        --% CONFIDENCE
                    </span>
                </div>

                <div class="mb-12">
                    <h2 id="signal" class="text-8xl font-black tracking-tighter mb-2 transition-all duration-500 text-slate-700">
                        WAIT
                    </h2>
                    <div class="flex items-baseline gap-3">
                        <p id="strike" class="text-2xl text-slate-400 font-light tracking-tight">Initializing Engine...</p>
                    </div>
                </div>

                <div class="bg-slate-900/60 rounded-2xl p-6 border border-slate-800/80 backdrop-blur-sm">
                    <div class="flex items-center gap-2 mb-3">
                        <svg class="w-3 h-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Current Scenario Analysis</p>
                    </div>
                    <p id="scenario-desc" class="text-sm text-slate-300 leading-relaxed italic">
                        Connecting to garg-enterprise database. Please ensure your Python brain is running on Desktop.
                    </p>
                </div>
            </div>
        </div>

        <div class="mt-8 flex justify-center gap-8 border-t border-slate-900 pt-8">
            <div class="text-center">
                <p class="text-[10px] text-slate-600 uppercase mb-1">Region</p>
                <p class="text-xs mono text-slate-400">Shimla / NSE</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] text-slate-600 uppercase mb-1">Data Bridge</p>
                <p class="text-xs mono text-slate-400">Firebase v9</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBmJDsXvokR8kYs_yoLPau1DqANPBBORJY",
            authDomain: "garg-enterprise.firebaseapp.com",
            databaseURL: "https://garg-enterprise-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "garg-enterprise",
            storageBucket: "garg-enterprise.firebasestorage.app",
            messagingSenderId: "1097408452571",
            appId: "1:1097408452571:web:4e6806326b47ebb0b5b9fe",
            measurementId: "G-S2S0MYT39W"
        };

        // Initialize
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const signalRef = ref(db, 'live_signal');

        // UI Element References
        const elSignal = document.getElementById('signal');
        const elStrike = document.getElementById('strike');
        const elConf = document.getElementById('conf-val');
        const elDesc = document.getElementById('scenario-desc');
        const elClock = document.getElementById('clock');
        const elGlow = document.getElementById('card-glow');

        // Listen for Real-time Data
        onValue(signalRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Update Content
                elSignal.innerText = data.verdict;
                elSignal.style.color = data.color;
                elStrike.innerText = "STRIKE " + data.strike;
                elConf.innerText = data.confidence + " CONFIDENCE";
                elDesc.innerText = data.scenario;
                elClock.innerText = data.timestamp;

                // Dynamic UI Changes
                document.title = `(${data.verdict}) Garg AI Portal`;
                elGlow.style.backgroundColor = data.color;
                elGlow.style.opacity = "0.3";
                
                // Set Confidence Pill Color based on verdict
                elConf.style.color = data.color;
                elConf.style.borderColor = data.color + "44";
            }
        });
    </script>
</body>
</html>
