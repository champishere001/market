<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARG AI | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #pulse-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl">
        <div class="flex justify-between items-end mb-8 px-2">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter">GARG <span class="text-blue-500">AI</span></h1>
                <p id="market-status" class="text-[10px] mono text-blue-400 font-bold uppercase tracking-widest mt-1">CONNECTING...</p>
            </div>
            <div class="text-right">
                <p id="clock" class="text-xs mono text-slate-500">00:00:00</p>
                <span class="text-[9px] font-black text-emerald-500 uppercase tracking-widest">● System Uplink</span>
            </div>
        </div>

        <div class="relative glass rounded-[3rem] p-10 shadow-2xl overflow-hidden">
            <div id="glow" class="absolute -inset-10 bg-blue-600/10 blur-[100px] transition-all duration-1000"></div>

            <div class="mb-12">
                <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">
                    <span>Bearish</span>
                    <span id="strength-txt">0% Confidence</span>
                    <span>Bullish</span>
                </div>
                <div class="h-2 w-full bg-slate-900 rounded-full overflow-hidden">
                    <div id="pulse-bar" class="h-full bg-blue-500 w-0"></div>
                </div>
            </div>

            <div class="flex justify-between items-center border-b border-white/5 pb-10 mb-8">
                <h2 id="verdict" class="text-8xl font-black tracking-tighter text-slate-800 transition-colors duration-500">WAIT</h2>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-right">
                    <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Target Strike</p>
                    <p id="strike" class="text-2xl font-black text-white italic">--</p>
                </div>
            </div>

            <div class="bg-blue-500/5 p-6 rounded-3xl border border-blue-500/10 mb-8">
                <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3">Current Affairs & Negotiations</p>
                <p id="scenario" class="text-sm font-semibold text-slate-200 leading-relaxed italic mb-2">Analyzing weekend data...</p>
                <p id="news-feed" class="text-[10px] mono text-slate-500 uppercase"></p>
            </div>

            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="p-2 bg-black/20 rounded-xl">
                    <p class="text-[8px] font-bold text-slate-500 uppercase">Nifty</p>
                    <p id="nifty" class="text-sm font-bold text-white">--</p>
                </div>
                <div class="p-2 bg-black/20 rounded-xl">
                    <p class="text-[8px] font-bold text-slate-500 uppercase">VIX</p>
                    <p id="vix" class="text-sm font-bold text-white">--</p>
                </div>
                <div class="p-2 bg-black/20 rounded-xl">
                    <p class="text-[8px] font-bold text-slate-500 uppercase">Bank Nifty</p>
                    <p id="bank" class="text-sm font-bold text-white">--</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // COMPLETE CONFIGURATION (Fixes the connection issue)
        const firebaseConfig = {
            apiKey: "AIzaSyBmJDsXvokR8kYs_yoLPau1DqANPBBORJY",
            authDomain: "garg-enterprise.firebaseapp.com",
            databaseURL: "https://garg-enterprise-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "garg-enterprise",
            storageBucket: "garg-enterprise.firebasestorage.app",
            messagingSenderId: "1097408452571",
            appId: "1:1097408452571:web:4e6806326b47ebb0b5b9fe",
            measurementId: "G-S2S0MYT39W"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const signalRef = ref(db, 'live_signal');

        onValue(signalRef, (snapshot) => {
            const d = snapshot.val();
            if (d) {
                document.getElementById('verdict').innerText = d.verdict;
                document.getElementById('verdict').style.color = d.color;
                document.getElementById('strike').innerText = "ATM " + d.strike;
                document.getElementById('scenario').innerText = d.scenario;
                document.getElementById('news-feed').innerText = d.news_feed;
                document.getElementById('clock').innerText = d.timestamp;
                document.getElementById('market-status').innerText = "MARKET: " + d.status;
                document.getElementById('pulse-bar').style.width = d.confidence;
                document.getElementById('pulse-bar').style.backgroundColor = d.color;
                document.getElementById('glow').style.backgroundColor = d.color;
                document.getElementById('nifty').innerText = d.nifty;
                document.getElementById('vix').innerText = d.vix;
                document.getElementById('bank').innerText = d.banknifty;
            }
        });
    </script>
</body>
</html>
