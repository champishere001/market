<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garg Enterprise | Market AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #strength-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .data-pills { border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter">GARG <span class="text-blue-500">AI</span> <span class="text-[10px] text-slate-500 ml-2 font-mono uppercase tracking-widest">PRO v4.0</span></h1>
                <p id="clock" class="text-[10px] mono text-blue-400 opacity-60">SYNCING...</p>
            </div>
            <div class="bg-blue-500/10 border border-blue-500/20 px-3 py-1 rounded-md">
                <span class="text-[9px] mono text-blue-400 uppercase font-bold tracking-tighter">NSE: NIFTY50</span>
            </div>
        </div>

        <div class="relative group">
            <div id="card-glow" class="absolute -inset-1 bg-blue-500 rounded-[2rem] blur-2xl opacity-10 transition-all duration-1000"></div>
            
            <div class="relative bg-[#0d111d] border border-white/5 rounded-[2rem] p-8 shadow-2xl overflow-hidden">
                
                <div class="mb-8">
                    <div class="flex justify-between text-[9px] mono text-slate-500 mb-2 font-bold tracking-widest uppercase">
                        <span>Put Zone</span>
                        <span id="strength-label">Market Strength: 0%</span>
                        <span>Call Zone</span>
                    </div>
                    <div class="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden flex">
                        <div id="strength-bar" class="h-full bg-blue-500 w-0 mx-auto rounded-full"></div>
                    </div>
                </div>

                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="signal" class="text-7xl font-black tracking-tighter transition-all duration-500 text-slate-800">WAIT</h2>
                        <p id="strike" class="text-xl text-slate-500 font-medium mt-1 tracking-tight">ATM: --</p>
                    </div>
                    <div id="conf-pill" class="text-[10px] mono border px-3 py-1 rounded-full font-bold opacity-50">--% CONF</div>
                </div>

                <div class="grid grid-cols-3 gap-4 mb-8 data-pills pt-6">
                    <div class="text-center">
                        <p class="text-[9px] text-slate-500 uppercase font-bold">Nifty</p>
                        <p id="nifty-val" class="text-sm font-mono text-slate-300">--</p>
                    </div>
                    <div class="text-center border-x border-white/5">
                        <p class="text-[9px] text-slate-500 uppercase font-bold">Bank Nifty</p>
                        <p id="bank-val" class="text-sm font-mono text-slate-300">--</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] text-slate-500 uppercase font-bold">India VIX</p>
                        <p id="vix-val" class="text-sm font-mono text-slate-300">--</p>
                    </div>
                </div>

                <div class="bg-black/40 rounded-xl p-5 border border-white/5">
                    <p id="scenario-desc" class="text-xs text-slate-400 leading-relaxed italic text-center">
                        Listening for signals from NSO Shimla Brain...
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://garg-enterprise-default-rtdb.asia-southeast1.firebasedatabase.app",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const signalRef = ref(db, 'live_signal');

        // Elements
        const elSignal = document.getElementById('signal');
        const elStrike = document.getElementById('strike');
        const elDesc = document.getElementById('scenario-desc');
        const elClock = document.getElementById('clock');
        const elGlow = document.getElementById('card-glow');
        const elStrength = document.getElementById('strength-bar');
        const elStrengthLabel = document.getElementById('strength-label');
        
        // Index Elements
        const elNifty = document.getElementById('nifty-val');
        const elBank = document.getElementById('bank-val');
        const elVix = document.getElementById('vix-val');
        const elConf = document.getElementById('conf-pill');

        onValue(signalRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                elSignal.innerText = data.verdict;
                elSignal.style.color = data.color;
                elStrike.innerText = "Strike: " + data.strike;
                elDesc.innerText = data.scenario;
                elClock.innerText = "Last Update: " + data.timestamp;
                elGlow.style.backgroundColor = data.color;
                
                // Update Multi-Index Data
                elNifty.innerText = data.nifty.toLocaleString();
                elBank.innerText = data.banknifty.toLocaleString();
                elVix.innerText = data.vix;
                
                // Update Strength Meter Graph
                const score = data.market_strength || 0;
                const width = Math.abs(score); 
                elStrength.style.width = width + "%";
                elStrength.style.backgroundColor = data.color;
                elStrengthLabel.innerText = `Market Strength: ${score}%`;
                
                // Update Confidence Pill
                elConf.innerText = score + "% CONF";
                elConf.style.borderColor = data.color;
                elConf.style.color = data.color;
                elConf.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
