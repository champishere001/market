name: Market Brain 24/7
on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 mins to keep it warm
  workflow_dispatch:      # Allows you to start it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install firebase-admin nsepython

      - name: Run Brain
        env:
          # This pulls the secret we saved earlier
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_KEY" > serviceAccountKey.json
          python market_brain.py
